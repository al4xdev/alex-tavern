name: Build and publish Android APK
description: Build the Android debug APK, upload it, and publish the matching release.

inputs:
  github_token:
    description: Token used to publish GitHub releases.
    required: true

runs:
  using: composite
  steps:
    - name: Setup Java JDK
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: temurin

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        gradle-version: '8.0.2'

    - name: Sync Static PWA Assets to Android Project
      shell: bash
      run: |
        mkdir -p .ci-cd/android/app/src/main/assets
        cp -r src/static/* .ci-cd/android/app/src/main/assets/

    - name: Build APK with Gradle
      shell: bash
      working-directory: .ci-cd/android
      run: gradle assembleDebug

    - name: Upload Compiled APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: .ci-cd/android/app/build/outputs/apk/debug/app-debug.apk

    - name: Deploy to GitHub Releases
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        GIT_REF: ${{ github.ref }}
        GIT_REF_NAME: ${{ github.ref_name }}
      run: |
        if [[ "$GIT_REF" == refs/tags/v* ]]; then
          tag_name="$GIT_REF_NAME"
          title="Release $tag_name"
          notes="Automated release build for tag $tag_name."
        else
          tag_name="latest"
          title="Latest Debug APK"
          notes="Latest automated debug build from master branch."
        fi

        if [ "$tag_name" = "latest" ]; then
          gh release delete latest --yes || true
        fi

        gh release create "$tag_name" .ci-cd/android/app/build/outputs/apk/debug/app-debug.apk \
          --title "$title" \
          --notes "$notes" \
          --prerelease

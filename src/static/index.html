<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleplay</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <h1>🎭 Roleplay</h1>
            <button id="new-session-btn" class="btn">Nova Sessão</button>
        </header>

        <!-- Scene Panel -->
        <div class="scene-panel" id="scene-panel">
            <span class="scene-location" id="scene-location"></span>
            <div class="scene-tags" id="scene-tags"></div>
        </div>

        <!-- Chat Log -->
        <div class="chat-log" id="chat-log">
            <div class="empty-state" id="empty-state">
                <div class="icon">🎭</div>
                <p>Iniciando sessão...</p>
            </div>
        </div>

        <!-- Spinner -->
        <div class="spinner" id="spinner">
            <div class="spinner-dot"></div>
            <div class="spinner-dot"></div>
            <div class="spinner-dot"></div>
            <span>Processando...</span>
        </div>

        <!-- Player Options -->
        <div class="options-panel" id="options-panel"></div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-row">
                <input
                    type="text"
                    class="input-field"
                    id="input-speech"
                    placeholder="💬 Fala / pensamento..."
                    disabled
                >
            </div>
            <div class="input-row">
                <input
                    type="text"
                    class="input-field"
                    id="input-action"
                    placeholder="🎬 Ação (ex: Thorn se levanta e vai até a porta)"
                    disabled
                >
                <button class="send-btn" id="send-btn" disabled>Enviar</button>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
